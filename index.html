<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>질문 포스트잇 보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #f0ebe0;
      min-height: 100vh;
      padding: 40px 24px 60px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #3a3028;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #8a7f72;
      margin-bottom: 32px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #c8bfb0;
      background: #fff;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { background: #f5f0e8; }
    .filter-btn.active {
      background: #3a3028;
      color: #fff;
      border-color: #3a3028;
    }

    .progress-bar-wrap {
      max-width: 400px;
      margin: 0 auto 32px;
      text-align: center;
    }

    .progress-label {
      font-size: 12px;
      color: #8a7f72;
      margin-bottom: 6px;
    }

    .progress-track {
      height: 6px;
      background: #ddd6ca;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #7c9e6e;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .board {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 카테고리별 포스트잇 색상 */
    .card { --card-bg: #fff9c4; --card-top: #f0e040; }
    .card[data-cat="평가/보상"]    { --card-bg: #fff0c4; --card-top: #f5c842; }
    .card[data-cat="복리후생"]     { --card-bg: #c8f0d8; --card-top: #5cbd84; }
    .card[data-cat="교육/성장"]    { --card-bg: #c4deff; --card-top: #5a9fe0; }
    .card[data-cat="근무제도"]     { --card-bg: #ffd6e0; --card-top: #f0708a; }
    .card[data-cat="휴가/휴직"]    { --card-bg: #e8d4f8; --card-top: #b06ad4; }
    .card[data-cat="커리어"]       { --card-bg: #ffe4c4; --card-top: #f09030; }
    .card[data-cat="행정/서류"]    { --card-bg: #d4f4f4; --card-top: #40b8b8; }
    .card[data-cat="조직문화"]     { --card-bg: #fce4d4; --card-top: #e07848; }
    .card[data-cat="평가/피드백"]  { --card-bg: #e4e8d0; --card-top: #8aaa40; }

    .card {
      width: 210px;
      min-height: 190px;
      background: var(--card-bg);
      border-radius: 3px 3px 6px 6px;
      padding: 0 0 16px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.3s, filter 0.3s;
      box-shadow: 3px 4px 10px rgba(0,0,0,0.13);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .card-top-bar {
      height: 10px;
      background: var(--card-top);
      border-radius: 3px 3px 0 0;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .card:hover:not(.read) {
      transform: translateY(-4px) rotate(-0.5deg);
      box-shadow: 5px 8px 16px rgba(0,0,0,0.18);
    }

    .card.read {
      opacity: 0.38;
      filter: grayscale(70%);
      cursor: default;
    }

    .card.hidden { display: none; }

    .card-num {
      position: absolute;
      top: 18px;
      right: 12px;
      font-size: 11px;
      color: rgba(0,0,0,0.25);
      font-weight: 600;
    }

    .card-category {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(0,0,0,0.4);
      padding: 0 14px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #2a2018;
      padding: 0 14px;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .card-purpose {
      font-size: 11px;
      color: rgba(0,0,0,0.45);
      padding: 0 14px;
      margin-top: auto;
      line-height: 1.4;
    }

    .card-purpose::before {
      content: "→ ";
    }

    .read-stamp {
      display: none;
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(0,0,0,0.3);
      border: 1.5px solid rgba(0,0,0,0.2);
      border-radius: 3px;
      padding: 2px 5px;
      letter-spacing: 1px;
    }

    .card.read .read-stamp { display: block; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      width: min(480px, 90vw);
      border-radius: 3px 3px 10px 10px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      animation: popIn 0.18s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-top-bar {
      height: 14px;
    }

    .modal-body {
      padding: 28px 28px 24px;
    }

    .modal-cat {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: rgba(0,0,0,0.38);
      margin-bottom: 10px;
    }

    .modal-num {
      font-size: 11px;
      color: rgba(0,0,0,0.25);
      float: right;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
      color: #1e1810;
      line-height: 1.55;
      margin-bottom: 16px;
    }

    .modal-purpose-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(0,0,0,0.35);
      margin-bottom: 4px;
    }

    .modal-purpose {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.12s;
    }

    .modal-btn-close {
      background: #fff;
      border-color: #ccc;
      color: #555;
    }
    .modal-btn-close:hover { background: #f5f5f5; }

    .modal-btn-read {
      background: #3a3028;
      color: #fff;
    }
    .modal-btn-read:hover { background: #55473a; }
    .modal-btn-read:disabled {
      background: #bbb;
      cursor: default;
    }
  </style>
</head>
<body>

<h1>📋 인사 질문 포스트잇 보드</h1>
<p class="subtitle">카드를 클릭하면 읽음 처리됩니다</p>

<div class="progress-bar-wrap">
  <div class="progress-label" id="progress-label">0 / 10 읽음</div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="전체">전체</button>
  <button class="filter-btn" data-filter="평가/보상">평가/보상</button>
  <button class="filter-btn" data-filter="복리후생">복리후생</button>
  <button class="filter-btn" data-filter="교육/성장">교육/성장</button>
  <button class="filter-btn" data-filter="근무제도">근무제도</button>
  <button class="filter-btn" data-filter="휴가/휴직">휴가/휴직</button>
  <button class="filter-btn" data-filter="커리어">커리어</button>
  <button class="filter-btn" data-filter="행정/서류">행정/서류</button>
  <button class="filter-btn" data-filter="조직문화">조직문화</button>
  <button class="filter-btn" data-filter="평가/피드백">평가/피드백</button>
</div>

<div class="board" id="board"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-top-bar" id="modal-top-bar"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const items = [
    { id:1,  cat:"평가/보상",   title:"현재 적용되고 있는 성과급(또는 인센티브) 산정 기준과 지급 시점이 어떻게 되나요?",                       purpose:"보상 체계의 투명성 확인" },
    { id:2,  cat:"평가/보상",   title:"올해 연봉 협상 또는 연봉 조정의 구체적인 프로세스와 일정이 궁금합니다.",                               purpose:"급여 인상 절차 파악" },
    { id:3,  cat:"복리후생",    title:"사내 복지 포인트나 선택적 복리후생 제도의 항목별 상세 사용 가이드를 받을 수 있을까요?",                   purpose:"복지 혜택 누락 방지" },
    { id:4,  cat:"교육/성장",   title:"업무 역량 강화를 위한 외부 교육비 지원이나 도서 구입비 신청 절차가 어떻게 되나요?",                       purpose:"자기계발 지원 활용" },
    { id:5,  cat:"근무제도",    title:"유연근무제(또는 시차출퇴근제) 신청 조건과 승인 절차에 대해 알고 싶습니다.",                             purpose:"근무 유연성 확보" },
    { id:6,  cat:"휴가/휴직",   title:"법정 연차 외에 부여되는 특별 유급 휴가나 장기 근속 포상 휴가 제도가 있나요?",                           purpose:"리프레시 제도 확인" },
    { id:7,  cat:"커리어",      title:"사내 직무 전환(Job Posting) 제도나 부서 이동 신청을 위한 자격 요건이 어떻게 되나요?",                    purpose:"사내 커리어 확장 가능성" },
    { id:8,  cat:"행정/서류",   title:"경력증명서, 원천징수영수증 등 각종 증명서를 온라인으로 즉시 발급받을 수 있는 경로가 어디인가요?",           purpose:"행정 절차 간소화" },
    { id:9,  cat:"조직문화",    title:"사내 고충 처리나 심리 상담 등 직원의 심리적 안정을 돕는 익명 채널이 운영되고 있나요?",                    purpose:"문제 발생 시 소통 창구 확인" },
    { id:10, cat:"평가/피드백", title:"인사 평가 결과에 대해 이의 제기가 필요한 경우, 어떤 절차를 거쳐 소명할 수 있나요?",                       purpose:"평가 정정 절차 파악" },
  ];

  const READ_KEY = "postit_read_ids_v1";
  function getReadIds() { return JSON.parse(localStorage.getItem(READ_KEY) || "[]"); }
  function markRead(id) {
    const ids = getReadIds();
    if (!ids.includes(id)) { ids.push(id); localStorage.setItem(READ_KEY, JSON.stringify(ids)); }
  }

  function updateProgress() {
    const readCount = getReadIds().length;
    const total = items.length;
    document.getElementById("progress-label").textContent = `${readCount} / ${total} 읽음`;
    document.getElementById("progress-fill").style.width = `${(readCount / total) * 100}%`;
  }

  let currentFilter = "전체";

  function renderBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";
    const readIds = getReadIds();

    items.forEach(item => {
      const isRead = readIds.includes(item.id);
      const card = document.createElement("div");
      card.className = "card" + (isRead ? " read" : "");
      if (currentFilter !== "전체" && item.cat !== currentFilter) card.classList.add("hidden");
      card.dataset.cat = item.cat;
      card.dataset.id = item.id;

      card.innerHTML = `
        <div class="card-top-bar"></div>
        <span class="card-num">#${item.id}</span>
        <div class="card-category">${item.cat}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-purpose">${item.purpose}</div>
        <span class="read-stamp">READ</span>
      `;

      card.addEventListener("click", () => openModal(item));

      board.appendChild(card);
    });

    updateProgress();
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      document.querySelectorAll(".card").forEach(card => {
        if (currentFilter === "전체" || card.dataset.cat === currentFilter) {
          card.classList.remove("hidden");
        } else {
          card.classList.add("hidden");
        }
      });
    });
  });

  // 카테고리별 배경색 (카드와 동일)
  const catColors = {
    "평가/보상":   { bg:"#fff0c4", top:"#f5c842" },
    "복리후생":    { bg:"#c8f0d8", top:"#5cbd84" },
    "교육/성장":   { bg:"#c4deff", top:"#5a9fe0" },
    "근무제도":    { bg:"#ffd6e0", top:"#f0708a" },
    "휴가/휴직":   { bg:"#e8d4f8", top:"#b06ad4" },
    "커리어":      { bg:"#ffe4c4", top:"#f09030" },
    "행정/서류":   { bg:"#d4f4f4", top:"#40b8b8" },
    "조직문화":    { bg:"#fce4d4", top:"#e07848" },
    "평가/피드백": { bg:"#e4e8d0", top:"#8aaa40" },
  };

  function openModal(item) {
    const overlay = document.getElementById("modal-overlay");
    const modal   = document.getElementById("modal");
    const topBar  = document.getElementById("modal-top-bar");
    const body    = document.getElementById("modal-body");
    const color   = catColors[item.cat] || { bg:"#fff9c4", top:"#f0e040" };
    const isRead  = getReadIds().includes(item.id);

    modal.style.background = color.bg;
    topBar.style.background = color.top;

    body.innerHTML = `
      <div class="modal-cat">
        <span class="modal-num">#${item.id}</span>
        ${item.cat}
      </div>
      <div class="modal-title">${item.title}</div>
      <div class="modal-purpose-label">질문 목적</div>
      <div class="modal-purpose">${item.purpose}</div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-close" id="modal-close-btn">닫기</button>
        <button class="modal-btn modal-btn-read" id="modal-read-btn" ${isRead ? "disabled" : ""}>
          ${isRead ? "✓ 읽음" : "읽음으로 표시"}
        </button>
      </div>
    `;

    overlay.classList.add("open");

    document.getElementById("modal-close-btn").addEventListener("click", closeModal);
    document.getElementById("modal-read-btn").addEventListener("click", () => {
      if (isRead) return;
      markRead(item.id);
      // 카드 UI 업데이트
      const card = document.querySelector(`.card[data-id="${item.id}"]`);
      if (card) card.classList.add("read");
      updateProgress();
      closeModal();
    });
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
  }

  document.getElementById("modal-overlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });

  renderBoard();
</script>
</body>
</html>
